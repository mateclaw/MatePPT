upstream backend {  
    server 123.249.26.106:8081;  
    
    # 添加 keepalive 连接池
    keepalive 32;
    keepalive_timeout 60s;
    keepalive_requests 1000;
}  
  
upstream minio_api {  
    server 139.129.194.245:9000;  
}  
  
# 主服务 - mateai.co (443端口)  
server {  
    listen 443 ssl http2;  
    server_name mateai.co www.mateai.co 123.249.26.106;  
      
    ssl_certificate /etc/nginx/ssl/aippt/mateai.co.pem;  
    ssl_certificate_key /etc/nginx/ssl/aippt/mateai.co.key;  
    
    # 全局 HTTP/1.1 支持
    proxy_http_version 1.1;
    
    # SSL 优化
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;


    gzip on;
    gzip_static on; 
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_vary on;
    gzip_proxied any;
    gzip_disable "MSIE [1-6]\.";

    gzip_types
        text/plain text/css text/javascript
        application/javascript application/x-javascript application/json
        application/xml application/xml+rss application/xhtml+xml
        image/svg+xml application/x-font-ttf application/x-font-opentype
        application/vnd.ms-fontobject application/font-woff application/font-woff2;
      
    # 后端 API  
    location ^~ /aippt/api/ {  
        proxy_pass http://backend/aippt/api/;
        
        # 解决 SSL 转发错误的关键配置
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        
        # 流式响应核心配置
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection '';

	gzip off;
        
        # 代理头设置 
        proxy_set_header Host $host;  
        proxy_set_header X-Real-IP $remote_addr;  
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # 新增
        proxy_set_header X-Forwarded-Proto $scheme;  
        proxy_set_header X-Forwarded-Host $host;      
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Scheme $scheme;  # 新增
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        
        # 禁用压缩和分块传输
        proxy_set_header Accept-Encoding '';
        chunked_transfer_encoding on;
        
        # 错误处理
        proxy_intercept_errors on;
        error_page 500 502 503 504 /50x.html;
    }  

    location ^~ /aiavatar/api/ {  
        proxy_pass http://123.249.26.106:8087/aiavatar/api/;
        
        # 解决 SSL 转发错误的关键配置
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        
        # 流式响应核心配置
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection '';

	gzip off;
        
        # 代理头设置 
        proxy_set_header Host $host;  
        proxy_set_header X-Real-IP $remote_addr;  
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # 新增
        proxy_set_header X-Forwarded-Proto $scheme;  
        proxy_set_header X-Forwarded-Host $host;      
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header X-Forwarded-Scheme $scheme;  # 新增
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        
        # 禁用压缩和分块传输
        proxy_set_header Accept-Encoding '';
        chunked_transfer_encoding on;
        
        # 错误处理
        proxy_intercept_errors on;
        error_page 500 502 503 504 /50x.html;
    }  
      
    # 前端缓存策略
    location = /index.html {
        root /usr/share/nginx/aippthtml/dist;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # umi 入口文件禁止缓存
    location = /umi.js {
        root /usr/share/nginx/aippthtml/dist;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    location = /umi.css {
        root /usr/share/nginx/aippthtml/dist;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # 其他静态资源缓存 1 天
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|webp|ico|woff2?|ttf|otf)$ {
        root /usr/share/nginx/aippthtml/dist;
        expires 1d;
        add_header Cache-Control "public";
    }

    # 前端  
    location / {  
        root /usr/share/nginx/aippthtml/dist;  
        try_files $uri $uri/ /index.html;  
    }  
    
    # 错误页面
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}  

# HTTP 重定向到 HTTPS
server {  
    listen 80;  
    server_name mateai.co www.mateai.co 123.249.26.106;  
    
    # 添加一些基本头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    return 301 https://$server_name$request_uri;  
}

# 阻止非法 Host 头访问
server {
    listen 443 ssl http2 default_server;
    listen 80 default_server;
    server_name _;
    ssl_reject_handshake on;
    return 444;
}
